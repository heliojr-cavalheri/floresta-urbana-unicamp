<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width" />
  <title>Floresta Urbana Unicamp — WebMap Público</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.34/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    .topbar {
      position: absolute;
      z-index: 20;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      pointer-events: none;
    }

    .brand {
      max-width: 520px;
      background: rgba(255, 255, 255, 0.94);
      border-left: 6px solid #9b2222;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      padding: 10px 14px;
      pointer-events: auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      color: #263238;
      line-height: 1.2;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #455a64;
      line-height: 1.35;
    }

    .locationPanel {
	display:none;
     
    }

    .locationPanel strong {
      color: #9b2222;
    }

    .btn {
      display:none
    }

    .btn:active {
      transform: scale(0.99);
    }

    @media (max-width: 640px) {
      .topbar {
        top: 8px;
        left: 8px;
        right: 8px;
      }

      .brand {
        padding: 8px 10px;
        max-width: calc(100vw - 24px);
      }

      .brand h1 {
        font-size: 14px;
      }

      .brand p {
        display: none;
      }

      .locationPanel {
        left: 10px;
        right: 10px;
        bottom: 14px;
        max-width: none;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <div class="topbar">
    <div class="brand">
      <h1>Floresta Urbana Unicamp</h1>
      <p>Clique no ponto da árvore e selecione “Abrir ficha botânica” para consultar as informações.</p>
    </div>
  </div>

  <div class="locationPanel" id="locationPanel">
    <strong>Status:</strong> carregando o mapa...<br />
    O navegador solicitará permissão para usar sua localização.
    <button class="btn" id="locateAgainBtn" type="button">Centralizar na minha localização</button>
  </div>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/Graphic",
      "esri/layers/GraphicsLayer",
      "esri/widgets/Home",
      "esri/widgets/ScaleBar",
      "esri/widgets/Compass",
      "esri/widgets/Search"
    ], function(WebMap, MapView, Graphic, GraphicsLayer, Home, ScaleBar, Compass, Search) {

      const CONFIG = {
        webmapId: "410e7028fc354f848844999a10ddc87e",

        // Recomendo 500 ou 1000 para uso público em campo.
        escalaLocalizacao: 500,

        // Para uso público, false é melhor.
        // Assim o usuário consegue navegar no mapa sem ele recentralizar sozinho.
        acompanharUsuario: false,

        fallbackCenter: [-47.0659, -22.8170],
        fallbackScale: 8000,

        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 5000
      };

      const panel = document.getElementById("locationPanel");

      const webmap = new WebMap({
        portalItem: {
          id: CONFIG.webmapId
        }
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap,
        center: CONFIG.fallbackCenter,
        scale: CONFIG.fallbackScale,
        constraints: {
          snapToZoom: false
        },
        popup: {
          dockEnabled: true,
          dockOptions: {
            buttonEnabled: false,
            position: "bottom-center",
            breakpoint: {
              width: 900,
              height: 900
            }
          }
        }
      });

      const userLayer = new GraphicsLayer({
        title: "Minha localização"
      });

      webmap.add(userLayer);

      let watchId = null;
      let firstLocation = true;

      function updatePanel(message) {
        panel.innerHTML =
          message +
          '<button class="btn" id="locateAgainBtn" type="button">Centralizar na minha localização</button>';

        document
          .getElementById("locateAgainBtn")
          .addEventListener("click", locateUserOnce);
      }

      function applyResponsivePopup() {
        if (window.innerWidth <= 900 || window.innerHeight <= 900) {
          view.popup.dockEnabled = true;
          view.popup.dockOptions = {
            buttonEnabled: false,
            position: "bottom-center",
            breakpoint: {
              width: 900,
              height: 900
            }
          };
        } else {
          view.popup.dockEnabled = true;
          view.popup.dockOptions = {
            buttonEnabled: true,
            position: "top-right",
            breakpoint: false
          };
        }
      }

      function drawUserLocation(longitude, latitude, accuracy) {
        userLayer.removeAll();

        const pointGraphic = new Graphic({
          geometry: {
            type: "point",
            longitude: longitude,
            latitude: latitude
          },
          symbol: {
            type: "simple-marker",
            style: "circle",
            color: [155, 34, 34, 0.95],
            size: 14,
            outline: {
              color: [255, 255, 255, 1],
              width: 2
            }
          },
          attributes: {
            titulo: "Minha localização",
            precisao: Math.round(accuracy || 0)
          },
          popupTemplate: {
            title: "Minha localização",
            content: "Precisão estimada: {precisao} m"
          }
        });

        userLayer.add(pointGraphic);
      }

      function goToUser(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        drawUserLocation(longitude, latitude, accuracy);

        view.goTo({
          center: [longitude, latitude],
          scale: CONFIG.escalaLocalizacao
        }, {
          duration: firstLocation ? 1200 : 600,
          easing: "ease-in-out"
        }).catch(function(error) {
          if (error.name !== "AbortError") {
            console.error(error);
          }
        });

        firstLocation = false;

        updatePanel(
          `<strong>Status:</strong> localização ativada.<br>` +
          `Precisão estimada: <strong>${Math.round(accuracy || 0)} m</strong>.<br>` +
          `Escala aplicada: <strong>1:${CONFIG.escalaLocalizacao}</strong>.`
        );
      }

      function locationError(error) {
        let msg = "Não foi possível obter a localização.";

        if (error.code === error.PERMISSION_DENIED) {
          msg = "Localização negada pelo usuário. Ative a permissão do navegador.";
        } else if (error.code === error.POSITION_UNAVAILABLE) {
          msg = "Localização indisponível. Verifique GPS, sinal e permissões.";
        } else if (error.code === error.TIMEOUT) {
          msg = "Tempo esgotado ao tentar obter a localização. Tente novamente.";
        }

        updatePanel(
          `<strong>Status:</strong> ${msg}<br>` +
          `O mapa foi aberto no enquadramento geral configurado.`
        );
      }

      function locateUserOnce() {
        if (!navigator.geolocation) {
          updatePanel("<strong>Status:</strong> este navegador não suporta geolocalização.");
          return;
        }

        updatePanel("<strong>Status:</strong> solicitando localização do dispositivo...");

        navigator.geolocation.getCurrentPosition(
          goToUser,
          locationError,
          {
            enableHighAccuracy: CONFIG.enableHighAccuracy,
            timeout: CONFIG.timeout,
            maximumAge: CONFIG.maximumAge
          }
        );
      }

      function startTracking() {
        if (!navigator.geolocation) {
          updatePanel("<strong>Status:</strong> este navegador não suporta geolocalização.");
          return;
        }

        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
        }

        watchId = navigator.geolocation.watchPosition(
          goToUser,
          locationError,
          {
            enableHighAccuracy: CONFIG.enableHighAccuracy,
            timeout: CONFIG.timeout,
            maximumAge: CONFIG.maximumAge
          }
        );
      }

      view.when(function() {
        view.ui.add(new Home({ view: view }), "top-left");
        view.ui.add(new Search({ view: view }), "top-right");
        view.ui.add(new Compass({ view: view }), "top-left");
        view.ui.add(new ScaleBar({ view: view, unit: "metric" }), "bottom-left");

        applyResponsivePopup();

        window.addEventListener("resize", applyResponsivePopup);
        window.addEventListener("orientationchange", function() {
          setTimeout(applyResponsivePopup, 400);
        });

        updatePanel("<strong>Status:</strong> mapa carregado. Solicitando localização...");

        if (CONFIG.acompanharUsuario) {
          startTracking();
        } else {
          locateUserOnce();
        }

      }).catch(function(error) {
        updatePanel(
          "<strong>Status:</strong> erro ao carregar o WebMap. Verifique se o ID está correto e se o item está público."
        );
        console.error(error);
      });

      document
        .getElementById("locateAgainBtn")
        .addEventListener("click", locateUserOnce);
    });
  </script>
</body>
</html>
